<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreador Chambatina</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px}
.card{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.1)}
input,textarea,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ccc}
button{background:#111;color:white;font-weight:bold}
.result{margin-top:15px;padding:15px;border-radius:10px;background:#fff8f1;border-left:5px solid orange}
.ok{color:green;font-size:28px;font-weight:bold}
.estado{background:#ffe7d1;padding:6px 10px;border-radius:20px;display:inline-block;margin-bottom:10px}
</style>
</head>

<body>

<div class="card">
<h1>Rastreador Chambatina</h1>

<input id="buscar" placeholder="Ej: 0260199">
<button onclick="buscar()">Buscar</button>

<div id="res"></div>

<h3>Base de datos</h3>
<textarea id="data"></textarea>
<button onclick="guardar()">Guardar</button>

</div>

<script>

// ===== DATOS (EDITAS SOLO ESTO) =====
var BASE = `
0260199|EN AGENCIA|2026-03-25|ROBERTO PACHECO|BATERIA 51V|SANTIAGO|5353194571
0260197|EN AGENCIA|2026-03-25|ROBERTO PACHECO|INVERSOR 10KW|SANTIAGO|5353194571
0260020|EN AGENCIA|2026-03-24|NANCY ROJAS|MISCELANEAS|HABANA|53608954
0259575|EN ALMACEN|2026-03-23|FELICIA CARVAJAL|MISCELANEAS|VILLA CLARA|53282278
0259555|EN AGENCIA|2026-03-23|OSMANY CASTELLON|BICICLETA|CIENFUEGOS|53421145
`;

// ===== FUNCIONES =====
function limpiar(x){
 return x.replace(/\D/g,"");
}

function parsear(txt){
 var base={};
 var lineas=txt.split("\n");

 for(var i=0;i<lineas.length;i++){
   var l=lineas[i].trim();
   if(!l) continue;

   var p=l.split("|");
   if(p.length<2) continue;

   var id=limpiar(p[0]);

   base[id]={
     cpk:id,
     estado:p[1],
     fecha:p[2],
     nombre:p[3],
     desc:p[4],
     dir:p[5],
     tel:p[6]
   };
 }

 return base;
}

function getDB(){
 var g=localStorage.getItem("db");
 if(g){return JSON.parse(g);}
 return parsear(BASE);
}

function guardar(){
 var txt=document.getElementById("data").value;
 var db=parsear(txt);
 localStorage.setItem("db",JSON.stringify(db));
 alert("Datos guardados");
}

function buscar(){
 var c=limpiar(document.getElementById("buscar").value);
 var db=getDB();
 var r=document.getElementById("res");

 if(!c){
   r.innerHTML='<div class="result">Escribe un CPK</div>';
   return;
 }

 if(!db[c]){
   r.innerHTML='<div class="result">No encontrado</div>';
   return;
 }

 var x=db[c];

 if(x.estado=="ENTREGADO"){
   r.innerHTML='<div class="result"><div class="ok">ENTREGADO</div></div>';
   return;
 }

 r.innerHTML=
 '<div class="result">'+
 '<div class="estado">'+x.estado+'</div>'+
 '<p><b>Cliente:</b> '+x.nombre+'</p>'+
 '<p><b>Producto:</b> '+x.desc+'</p>'+
 '<p><b>Fecha:</b> '+x.fecha+'</p>'+
 '<p><b>Dirección:</b> '+x.dir+'</p>'+
 '<p><b>Tel:</b> '+x.tel+'</p>'+
 '</div>';
}

window.onload=function(){
 document.getElementById("data").value=BASE.trim();
}

</script>

</body>
</html>
