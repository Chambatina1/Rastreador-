<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chambatina</title>

<style>
:root{
  --bg:#f7f1df;
  --panel:#fff6e8;
  --panel-2:#fbf2e4;
  --text:#5f4d3f;
  --muted:#8d7a68;
  --line:#ecdcc6;
  --primary:#eecf93;
  --primary-dark:#d9b777;
  --mint:#b8ddb0;
  --mint-soft:#eff8ec;
  --aqua:#9fd9d3;
  --aqua-soft:#e7f7f4;
  --danger:#cf8f7c;
  --danger-soft:#f9ebe5;
  --shadow:0 20px 60px rgba(123,96,72,.10);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(159,217,211,.18), transparent 25%),
    radial-gradient(circle at top right, rgba(238,207,147,.20), transparent 22%),
    var(--bg);
  color:var(--text);
}

.container{
  max-width:720px;
  margin:0 auto;
  padding:22px 14px 110px;
}

.logo{
  text-align:center;
  margin-bottom:12px;
}

.logo img{
  width:118px;
  height:auto;
  display:block;
  margin:0 auto 12px;
  border-radius:50%;
  box-shadow:var(--shadow);
  background:#fff9f0;
  padding:6px;
}

h1{
  text-align:center;
  margin:10px 0 4px;
  font-size:34px;
  color:#8d7a68;
}

.subtitle{
  text-align:center;
  font-size:18px;
  color:var(--muted);
  margin-bottom:22px;
}

.box{
  background:var(--panel);
  border-radius:24px;
  padding:0;
  box-shadow:var(--shadow);
  overflow:hidden;
  border:1px solid var(--line);
}

.chat-header{
  display:flex;
  align-items:center;
  gap:12px;
  padding:15px 16px;
  background:#fffaf2;
  border-bottom:1px solid var(--line);
}

.chat-avatar{
  width:54px;
  height:54px;
  border-radius:50%;
  object-fit:contain;
  background:#fff;
  padding:4px;
  box-shadow:0 8px 18px rgba(123,96,72,.10);
  flex-shrink:0;
}

.chat-header-text h3{
  margin:0;
  font-size:18px;
  font-weight:800;
  color:var(--text);
}

.chat-header-text p{
  margin:3px 0 0;
  font-size:13px;
  color:var(--muted);
}

.chat-content{
  padding:16px;
}

#chatBox{
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:18px;
  min-height:240px;
  max-height:340px;
  overflow-y:auto;
  padding:12px;
  margin-bottom:14px;
  white-space:pre-line;
}

.msg{
  max-width:85%;
  padding:12px 14px;
  border-radius:18px;
  margin:8px 0;
  font-size:17px;
  line-height:1.45;
  box-shadow:0 4px 12px rgba(123,96,72,.05);
}

.bot{
  background:#f8f1e5;
  color:var(--text);
  border:1px solid #e8d8c1;
}

.user{
  background:var(--primary);
  color:var(--text);
  font-weight:700;
  margin-left:auto;
}

input{
  width:100%;
  height:56px;
  border-radius:16px;
  border:1px solid #d8c8b2;
  padding:12px 14px;
  font-size:18px;
  margin-bottom:10px;
  background:#fffdf9;
  color:var(--text);
}

input:focus{
  outline:none;
  border-color:var(--aqua);
  box-shadow:0 0 0 3px rgba(159,217,211,.18);
}

button{
  width:100%;
  height:56px;
  border:none;
  border-radius:16px;
  background:var(--primary);
  font-size:20px;
  font-weight:800;
  cursor:pointer;
  color:var(--text);
  transition:.2s ease;
}

button:hover{
  background:var(--primary-dark);
  color:#fff;
}

button:disabled,
input:disabled{
  opacity:.75;
  cursor:not-allowed;
}

#installAppBox{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  background:#7b6653;
  color:#ffffff;
  padding:10px 12px;
  border-radius:999px;
  display:none;
  align-items:center;
  gap:10px;
  box-shadow:0 12px 30px rgba(0,0,0,.18);
  z-index:9999;
  max-width:92%;
}

#installAppText{
  font-size:14px;
  font-weight:700;
  white-space:nowrap;
}

#installBtn{
  width:auto;
  height:auto;
  padding:10px 16px;
  border:none;
  border-radius:999px;
  background:var(--primary);
  color:var(--text);
  font-size:14px;
  font-weight:800;
  cursor:pointer;
}

#iosInstallTip{
  display:none;
  margin-top:14px;
  background:#fff7ed;
  border:1px solid #e8d8b6;
  color:#9b8468;
  border-radius:14px;
  padding:12px 14px;
  font-size:14px;
  line-height:1.45;
}

@media (max-width:600px){
  .container{
    padding:14px 10px 110px;
  }

  .logo img{
    width:96px;
  }

  h1{
    font-size:28px;
  }

  .subtitle{
    font-size:16px;
  }

  .chat-avatar{
    width:48px;
    height:48px;
  }

  .chat-header-text h3{
    font-size:16px;
  }

  .chat-header-text p{
    font-size:12px;
  }

  .msg{
    font-size:16px;
  }

  input{
    font-size:16px;
  }

  button{
    font-size:18px;
  }

  #installAppBox{
    width:auto;
    padding:10px;
    gap:8px;
  }

  #installAppText{
    font-size:13px;
  }

  #installBtn{
    padding:9px 14px;
    font-size:13px;
  }
}
</style>
</head>

<body>
<div class="container">

  <div class="logo">
    <img src="chambita.png" alt="Chambita">
  </div>

  <h1>Chambatina</h1>
  <div class="subtitle">
    Consulte su paquete o haga su pregunta
  </div>

  <div class="box">

    <div class="chat-header">
      <img src="chambita.png" alt="Chambita" class="chat-avatar">
      <div class="chat-header-text">
        <h3>Chambita</h3>
        <p>Asistente virtual</p>
      </div>
    </div>

    <div class="chat-content">
      <div id="chatBox">
        <div class="msg bot">
          Escriba su número CPK o su pregunta.
        </div>
      </div>

      <input id="mensaje" placeholder="Ej: 1234567 o ¿precio de envío?" />
      <button id="btnEnviar" onclick="procesar()">Enviar</button>

      <div id="iosInstallTip">
        En iPhone puede instalar esta app tocando el botón de compartir en Safari y luego “Agregar a pantalla de inicio”.
      </div>
    </div>

  </div>

</div>

<div id="installAppBox">
  <span id="installAppText">Instalar Chambatina</span>
  <button id="installBtn" type="button">Instalar</button>
</div>

<script>
const BACKEND_URL = "https://rastreador-tj5b.onrender.com";

const chatBox = document.getElementById("chatBox");
const input = document.getElementById("mensaje");
const btnEnviar = document.getElementById("btnEnviar");
const installAppBox = document.getElementById("installAppBox");
const installBtn = document.getElementById("installBtn");
const iosInstallTip = document.getElementById("iosInstallTip");

let procesando = false;
let deferredPrompt = null;

function addMessage(texto, tipo){
  const div = document.createElement("div");
  div.className = "msg " + tipo;
  div.textContent = texto;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function normalizarNumero(texto){
  return String(texto || "").replace(/\D/g,"");
}

function esCPK(texto){
  const limpio = normalizarNumero(texto);
  return limpio.length >= 6 && limpio.length <= 10;
}

function setProcesando(valor){
  procesando = valor;
  input.disabled = valor;
  btnEnviar.disabled = valor;
}

async function procesar(){
  if(procesando) return;

  const mensaje = input.value.trim();
  if(!mensaje) return;

  addMessage(mensaje,"user");
  input.value = "";
  setProcesando(true);

  try{
    if(esCPK(mensaje)){
      await buscarCPK(mensaje);
    }else{
      await enviarChat(mensaje);
    }
  }finally{
    setProcesando(false);
    input.focus();
  }
}

async function enviarChat(mensaje){
  try{
    const res = await fetch(`${BACKEND_URL}/api/chat`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({mensaje})
    });

    const data = await res.json();

    if(!res.ok || !data.ok){
      addMessage(data.mensaje || "No se pudo procesar la pregunta.","bot");
      return;
    }

    addMessage(data.respuesta || "Sin respuesta.","bot");

  }catch(e){
    addMessage("No se pudo conectar con el asistente.","bot");
  }
}

async function buscarCPK(codigo){
  const cpk = normalizarNumero(codigo);

  try{
    const res = await fetch(`${BACKEND_URL}/api/rastreo/${cpk}`);
    const data = await res.json();

    if(!res.ok || !data.ok){
      addMessage(data.mensaje || "No se encontró el paquete.","bot");
      return;
    }

    addMessage(
      (data.saludo || ("Hola, tu mercancía se encuentra en: " + data.estado + ".")) +
      "\n\nFecha: " + (data.fecha || "No disponible") +
      "\n\nDescripción:\n" + (data.descripcion || "Sin descripción disponible."),
      "bot"
    );

  }catch(e){
    addMessage("Error al buscar el paquete.","bot");
  }
}

input.addEventListener("keydown",function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    procesar();
  }
});

window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault();
  deferredPrompt = e;
  installAppBox.style.display = "flex";
});

installBtn.addEventListener("click", async function(){
  if(!deferredPrompt) return;

  deferredPrompt.prompt();
  const choiceResult = await deferredPrompt.userChoice;

  if(choiceResult && choiceResult.outcome){
    console.log("Resultado instalación:", choiceResult.outcome);
  }

  deferredPrompt = null;
  installAppBox.style.display = "none";
});

window.addEventListener("appinstalled", function(){
  installAppBox.style.display = "none";
  deferredPrompt = null;
});

function esIOS(){
  return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
}

function esSafari(){
  return /^((?!chrome|android).)*safari/i.test(window.navigator.userAgent);
}

function estaEnStandalone(){
  return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
}

if(esIOS() && esSafari() && !estaEnStandalone()){
  iosInstallTip.style.display = "block";
}
</script>
</body>
</html>
