<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rastreador Chambatina</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff8f0, #ffe8d1);
      color: #111;
    }
    .wrap {
      max-width: 1100px;
      margin: 30px auto;
      padding: 16px;
    }
    .card {
      background: #fff;
      border: 2px solid #ff7a00;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h1 {
      text-align: center;
      margin: 0 0 10px;
      font-size: 34px;
    }
    .sub {
      text-align: center;
      color: #444;
      margin-bottom: 24px;
      font-size: 17px;
    }
    .search-box {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 22px;
    }
    .search-box input {
      flex: 1;
      min-width: 240px;
      max-width: 380px;
      padding: 15px 16px;
      border: 2px solid #111;
      border-radius: 14px;
      font-size: 18px;
      background: #111;
      color: #fff;
      outline: none;
    }
    .search-box input::placeholder { color: #cfcfcf; }
    .search-box button {
      padding: 15px 24px;
      border: none;
      border-radius: 14px;
      background: #ff7a00;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .search-box button:hover { opacity: .92; }

    .resultado {
      margin-top: 12px;
    }

    .error, .vacio {
      background: #fff;
      border-left: 6px solid #d32f2f;
      border-radius: 14px;
      padding: 18px;
      color: #222;
    }
    .vacio {
      border-left-color: #ff7a00;
    }

    .panel {
      background: #fff;
      border-radius: 20px;
      border: 2px solid #ddd;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,.07);
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 28px;
    }

    .estado-pill {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      color: #fff;
      font-weight: bold;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .campo {
      background: #fff8f0;
      border-radius: 14px;
      padding: 14px;
      border: 1px solid #ffd2a8;
    }
    .campo strong {
      display: block;
      margin-bottom: 6px;
      color: #111;
    }
    .campo span {
      color: #333;
      line-height: 1.5;
      word-break: break-word;
    }

    .explicacion {
      margin-top: 18px;
      background: #fff6eb;
      border-left: 6px solid #ff7a00;
      border-radius: 14px;
      padding: 16px;
    }
    .explicacion h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .ok {
      text-align: center;
      border: 2px solid #1f8b3a;
      background: #fff;
      border-radius: 22px;
      padding: 28px 20px;
    }
    .ok .grande {
      font-size: 46px;
      font-weight: 900;
      color: #1f8b3a;
      margin: 12px 0;
    }

    .meta {
      margin-top: 18px;
      font-size: 14px;
      color: #666;
      text-align: center;
    }

    .small-note {
      margin-top: 12px;
      color: #666;
      font-size: 14px;
      text-align: center;
    }

    details {
      margin-top: 18px;
      background: #fafafa;
      border-radius: 12px;
      padding: 12px 14px;
      border: 1px solid #ececec;
    }
    details summary {
      cursor: pointer;
      font-weight: bold;
      color: #333;
    }
    .historial-item {
      padding: 10px 0;
      border-bottom: 1px solid #ececec;
      font-size: 15px;
      color: #333;
    }
    .historial-item:last-child {
      border-bottom: none;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 28px;
      }
      .panel h2 {
        font-size: 24px;
      }
      .ok .grande {
        font-size: 38px;
      }
    }
  </style>
</head>

    let baseDatos = {};
    let totalLineasProcesadas = 0;

    function limpiarTexto(valor) {
      return (valor || "").toString().replace(/\s+/g, " ").trim();
    }

    function obtenerSoloDigitosCPK(valor) {
      if (!valor) return "";
      const limpio = valor.toString().toUpperCase().replace(/[^0-9]/g, "");
      return limpio;
    }

    function normalizarEstado(estado) {
      const e = limpiarTexto(estado).toUpperCase();
      if (!e) return "EN PROCESO";
      return e;
    }

    function safeAt(arr, index) {
      return index >= 0 && index < arr.length ? limpiarTexto(arr[index]) : "";
    }

    function parsearRawData(rawText) {
      const lineas = rawText
        .split(/\r?\n/)
        .map(l => l.replace(/\u00A0/g, ""))
        .filter(l => l.trim().length > 0);

      const mapa = {};
      let procesadas = 0;

      for (let numeroLinea = 0; numeroLinea < lineas.length; numeroLinea++) {
        const linea = lineas[numeroLinea];

        const columnas = linea.split("\t");
        const idxCpk = columnas.findIndex(c => /CPK-\d+/i.test(c));

        if (idxCpk === -1) continue;

        const cpkRaw = safeAt(columnas, idxCpk);
        const cpkDigits = obtenerSoloDigitosCPK(cpkRaw);

        if (!cpkDigits) continue;

        const estado = normalizarEstado(safeAt(columnas, idxCpk + 1));
        const tipo = safeAt(columnas, idxCpk + 5);
        const descripcion = safeAt(columnas, idxCpk + 6);
        const factura = safeAt(columnas, idxCpk + 7);
        const fecha = safeAt(columnas, idxCpk + 8);
        const cliente = safeAt(columnas, idxCpk + 9);
        const ci = safeAt(columnas, idxCpk + 11);
        const direccion = safeAt(columnas, idxCpk + 12);
        const telefono = safeAt(columnas, idxCpk + 13);
        const remitente = safeAt(columnas, idxCpk + 14);
        const peso = safeAt(columnas, idxCpk + 20);

        const registro = {
          cpk: cpkDigits,
          cpkCompleto: cpkRaw || ("CPK-" + cpkDigits),
          estado,
          tipo,
          descripcion,
          factura,
          fecha,
          cliente,
          ci,
          direccion,
          telefono,
          remitente,
          peso,
          numeroLinea
        };

        if (!mapa[cpkDigits]) {
          mapa[cpkDigits] = {
            actual: registro,
            historial: [registro]
          };
        } else {
          mapa[cpkDigits].historial.push(registro);

          const actual = mapa[cpkDigits].actual;
          const fechaActual = convertirFecha(actual.fecha);
          const fechaNueva = convertirFecha(registro.fecha);

          // Regla:
          // 1) si la fecha nueva es más reciente, reemplaza
          // 2) si la fecha es igual o no comparable, gana la última línea pegada
          if (fechaNueva > fechaActual || fechaNueva === fechaActual || !fechaActual) {
            mapa[cpkDigits].actual = registro;
          }
        }

        procesadas++;
      }

      totalLineasProcesadas = procesadas;
      return mapa;
    }

    function convertirFecha(fecha) {
      if (!fecha || !/^\d{4}-\d{2}-\d{2}$/.test(fecha)) return 0;
      return new Date(fecha + "T00:00:00").getTime();
    }

    function formatearFecha(fechaTexto) {
      if (!fechaTexto) return "Sin fecha";
      if (!/^\d{4}-\d{2}-\d{2}$/.test(fechaTexto)) return fechaTexto;
      const f = new Date(fechaTexto + "T00:00:00");
      return f.toLocaleDateString("es-US", {
        year: "2-digit",
        month: "2-digit",
        day: "2-digit"
      });
    }

    function calcularDiasDesde(fechaTexto) {
      if (!fechaTexto || !/^\d{4}-\d{2}-\d{2}$/.test(fechaTexto)) return 0;
      const inicio = new Date(fechaTexto + "T00:00:00");
      const hoy = new Date();
      const diff = hoy - inicio;
      return Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24)));
    }

    function colorPorEstado(estado) {
      const e = (estado || "").toUpperCase();
      switch (e) {
        case "ENTREGADO": return "#1f8b3a";
        case "EN AGENCIA": return "#6d4c41";
        case "EN ALMACEN": return "#1565c0";
        case "CLASIFICADO": return "#1565c0";
        case "DESAGRUPE": return "#8e24aa";
        case "DESPACHO": return "#ef6c00";
        case "DISTRIBUCIÓN":
        case "DISTRIBUCION": return "#00897b";
        case "ARRIBO": return "#3949ab";
        case "CANAL ROJO": return "#c62828";
        default: return "#424242";
      }
    }

    function mensajePorEstado(estado, fecha) {
      const e = (estado || "").toUpperCase();
      const dias = calcularDiasDesde(fecha);

      let progreso = "";
      if (dias <= 3) {
        progreso = "El proceso va iniciando y su envío sigue una ruta logística normal.";
      } else if (dias <= 6) {
        progreso = "La carga continúa moviéndose de forma ordenada dentro del sistema.";
      } else if (dias <= 9) {
        progreso = "El paquete sigue avanzando y acercándose a una etapa más próxima a entrega.";
      } else if (dias <= 15) {
        progreso = "Su envío ya está en una fase más madura del proceso logístico.";
      } else {
        progreso = "Algunas rutas pueden tardar un poco más, pero el paquete continúa en operación.";
      }

      switch (e) {
        case "EN ALMACEN":
          return "Su paquete se encuentra en almacén. Esto indica que ya fue recibido y está dentro del flujo de organización y salida correspondiente. " + progreso;

        case "EN AGENCIA":
          return "Su paquete ya aparece en agencia. Eso normalmente significa que está en una etapa bastante cercana a coordinación final o entrega local. " + progreso;

        case "CLASIFICADO":
          return "Su paquete fue clasificado por ruta, provincia o almacén. Esto ayuda a que continúe hacia el siguiente movimiento operativo. " + progreso;

        case "DESAGRUPE":
          return "Su envío está siendo separado del lote general o contenedor para continuar con su manejo individual. " + progreso;

        case "DESPACHO":
          return "Su paquete está en despacho, es decir, pasando una fase de salida operativa para seguir su recorrido. " + progreso;

        case "DISTRIBUCIÓN":
        case "DISTRIBUCION":
          return "Su paquete ya entró en distribución y se acerca más a su destino final. " + progreso;

        case "ARRIBO":
          return "La carga ya arribó y continúa con el proceso interno de organización y movimiento. " + progreso;

        case "CANAL ROJO":
          return "Su envío está en revisión adicional. Esto no significa pérdida; indica un control más detallado dentro del proceso. " + progreso;

        case "ENTREGADO":
          return "Su paquete fue entregado correctamente.";

        default:
          return "Su paquete sigue en proceso logístico. " + progreso;
      }
    }

    function crearHistorialHTML(historial) {
      if (!historial || historial.length <= 1) return "";

      const ordenado = [...historial].sort((a, b) => {
        const fa = convertirFecha(a.fecha);
        const fb = convertirFecha(b.fecha);
        return fb - fa || b.numeroLinea - a.numeroLinea;
      });

      return `
        <details>
          <summary>Ver historial de registros repetidos (${historial.length})</summary>
          ${ordenado.map(item => `
            <div class="historial-item">
              <strong>${item.cpkCompleto}</strong> · ${item.estado} · ${formatearFecha(item.fecha)}<br>
              ${item.descripcion ? item.descripcion + "<br>" : ""}
              ${item.cliente ? "Cliente: " + item.cliente + "<br>" : ""}
              ${item.direccion ? "Dirección: " + item.direccion : ""}
            </div>
          `).join("")}
        </details>
      `;
    }

    function buscarPaquete() {
      const input = document.getElementById("cpkInput").value.trim();
      const cpk = obtenerSoloDigitosCPK(input);
      const resultado = document.getElementById("resultado");

      if (!cpk) {
        resultado.innerHTML = `
          <div class="vacio">
            Por favor, escriba su número CPK.
          </div>
        `;
        return;
      }

      const item = baseDatos[cpk];

      if (!item) {
        resultado.innerHTML = `
          <div class="error">
            <strong>Número no encontrado.</strong><br>
            No encontramos información para el CPK <strong>${cpk}</strong>. Revise el número e intente otra vez.
          </div>
        `;
        return;
      }

      const paquete = item.actual;
      const color = colorPorEstado(paquete.estado);
      const explicacion = mensajePorEstado(paquete.estado, paquete.fecha);
      const historialHTML = crearHistorialHTML(item.historial);

      if ((paquete.estado || "").toUpperCase() === "ENTREGADO") {
        resultado.innerHTML = `
          <div class="ok">
            <div style="font-size:18px;color:#1f8b3a;font-weight:bold;">Estado final</div>
            <div class="grande">ENTREGADO</div>
            <p><strong>CPK:</strong> ${paquete.cpkCompleto}</p>
            <p><strong>Cliente:</strong> ${paquete.cliente || "No disponible"}</p>
            <p><strong>Fecha:</strong> ${formatearFecha(paquete.fecha)}</p>
            <p><strong>Descripción:</strong> ${paquete.descripcion || "No disponible"}</p>
            ${historialHTML}
          </div>
        `;
        return;
      }

      resultado.innerHTML = `
        <div class="panel" style="border-color:${color};">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
            <h2>${paquete.cpkCompleto}</h2>
            <span class="estado-pill" style="background:${color};">${paquete.estado}</span>
          </div>

          <div class="grid">
            <div class="campo"><strong>Cliente</strong><span>${paquete.cliente || "No disponible"}</span></div>
            <div class="campo"><strong>Fecha</strong><span>${formatearFecha(paquete.fecha)}</span></div>
            <div class="campo"><strong>Descripción</strong><span>${paquete.descripcion || "No disponible"}</span></div>
            <div class="campo"><strong>Factura</strong><span>${paquete.factura || "No disponible"}</span></div>
            <div class="campo"><strong>Dirección</strong><span>${paquete.direccion || "No disponible"}</span></div>
            <div class="campo"><strong>Teléfono</strong><span>${paquete.telefono || "No disponible"}</span></div>
            <div class="campo"><strong>Remitente</strong><span>${paquete.remitente || "No disponible"}</span></div>
            <div class="campo"><strong>Peso</strong><span>${paquete.peso || "No disponible"}</span></div>
          </div>

          <div class="explicacion">
            <h3>Explicación del estado</h3>
            <p>${explicacion}</p>
          </div>

          ${historialHTML}
        </div>
      `;
    }

    function iniciarBase() {
      baseDatos = parsearRawData(RAW_DATA);
      document.getElementById("totalRegistros").textContent = totalLineasProcesadas;
      document.getElementById("totalCPK").textContent = Object.keys(baseDatos).length;
    }

    document.getElementById("cpkInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") buscarPaquete();
    });

    iniciarBase();
  </script>
</body>
</html>
