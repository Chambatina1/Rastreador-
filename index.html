<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Chambatina</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 40px 20px;
      margin: 0;
    }

    .box {
      max-width: 700px;
      margin: 0 auto;
      background: #1b1b1b;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 0 20px rgba(0,0,0,0.25);
    }

    h1 {
      margin-top: 0;
      color: orange;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #444;
      font-size: 16px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }

    button {
      background: orange;
      color: black;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    #estado {
      margin-top: 16px;
      font-size: 14px;
      color: #ccc;
    }

    #respuesta {
      margin-top: 18px;
      background: #252525;
      padding: 18px;
      border-radius: 12px;
      min-height: 70px;
      text-align: left;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Chat Chambatina</h1>
    <p>Pregunte sobre envíos, libras, precios o logística.</p>

    <input
      type="text"
      id="mensaje"
      placeholder="Escribe tu pregunta aquí"
      onkeydown="if(event.key==='Enter'){enviar();}"
    />

    <button onclick="enviar()">Enviar</button>

    <div id="estado"></div>
    <div id="respuesta">Aquí aparecerá la respuesta.</div>
  </div>

  <script>
    async function enviar() {
      const input = document.getElementById("mensaje");
      const estado = document.getElementById("estado");
      const respuesta = document.getElementById("respuesta");

      const mensaje = input.value.trim();

      if (!mensaje) {
        respuesta.innerText = "Escribe una pregunta primero.";
        return;
      }

      estado.innerText = "Consultando servidor...";
      respuesta.innerText = "";

      try {
        const res = await fetch("https://rastreador-tj5b.onrender.com/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: mensaje })
        });

        const data = await res.json();

        if (!res.ok) {
          respuesta.innerText = "Error: " + (data.error || "No se pudo obtener respuesta.");
          estado.innerText = "La consulta falló.";
          return;
        }

        respuesta.innerText = data.reply || "No llegó texto de respuesta.";
        estado.innerText = "Respuesta recibida.";
      } catch (error) {
        respuesta.innerText = "Error de conexión con el servidor.";
        estado.innerText = "No se pudo conectar con Render.";
        console.error(error);
      }
    }
  </script>
</body>
</html>
