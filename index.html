<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Chambatina</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .title {
      text-align: center;
      margin-top: 20px;
      margin-bottom: 10px;
      font-size: 54px;
      font-weight: 700;
      color: #f59e0b;
    }

    .subtitle {
      text-align: center;
      color: #bfbfbf;
      font-size: 18px;
      margin-bottom: 30px;
    }

    .card {
      background: #0b0b0b;
      border: 1px solid #242424;
      border-radius: 28px;
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,.35);
    }

    .card-header {
      background: #f59e0b;
      color: #000;
      font-size: 22px;
      font-weight: 700;
      padding: 18px 22px;
    }

    .card-body {
      padding: 22px;
    }

    #chatBox {
      background: #0f0f10;
      border: 1px solid #2d2d2d;
      border-radius: 24px;
      min-height: 260px;
      max-height: 420px;
      overflow-y: auto;
      padding: 18px;
      margin-bottom: 18px;
    }

    .msg {
      max-width: 86%;
      padding: 16px 18px;
      border-radius: 22px;
      margin: 10px 0;
      line-height: 1.45;
      font-size: 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .user {
      margin-left: auto;
      background: #f59e0b;
      color: #000;
      font-weight: 600;
    }

    .bot {
      margin-right: auto;
      background: #222;
      color: #f2f2f2;
    }

    .input {
      width: 100%;
      background: #050505;
      color: #fff;
      border: 1px solid #323232;
      border-radius: 22px;
      padding: 20px;
      font-size: 18px;
      outline: none;
    }

    .btn {
      width: 100%;
      margin-top: 16px;
      background: #f59e0b;
      color: #000;
      border: none;
      border-radius: 22px;
      padding: 18px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .quick-btn {
      background: #222;
      color: #fff;
      border: 1px solid #333;
      border-radius: 999px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .result-box {
      background: #111;
      border: 1px solid #2d2d2d;
      border-radius: 22px;
      padding: 20px;
      min-height: 120px;
      font-size: 18px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .estado {
      color: #f59e0b;
      font-weight: 700;
      font-size: 24px;
      margin-bottom: 8px;
    }

    @media (max-width: 700px) {
      .title { font-size: 34px; }
      .subtitle { font-size: 16px; }
      .quick-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">Robot Chambatina</div>
    <div class="subtitle">Asistente con chat y rastreo</div>

    <div class="card">
      <div class="card-header">Chat inteligente</div>
      <div class="card-body">
        <div id="chatBox">
          <div class="msg bot">Bienvenido. Escriba su pregunta y pulse Enviar.</div>
        </div>

        <input id="mensaje" class="input" type="text" placeholder="Escriba aquí su mensaje" />
        <button id="btnEnviar" class="btn" type="button">Enviar</button>

        <div class="quick-grid">
          <button class="quick-btn" type="button" onclick="preguntaRapida('¿Cuál es el precio por libra?')">Precio por libra</button>
          <button class="quick-btn" type="button" onclick="preguntaRapida('¿Qué cajas tienen disponibles?')">Cajas</button>
          <button class="quick-btn" type="button" onclick="preguntaRapida('¿Cuál es el tiempo de entrega?')">Tiempo de entrega</button>
          <button class="quick-btn" type="button" onclick="preguntaRapida('¿Cómo cobran los equipos?')">Equipos</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Rastreo de paquete</div>
      <div class="card-body">
        <input id="cpk" class="input" type="text" placeholder="Escriba su CPK" />
        <button id="btnBuscarCPK" class="btn" type="button">Buscar</button>
        <div id="rastreoResultado" class="result-box" style="margin-top:16px;">
          Escriba su CPK y pulse Buscar.
        </div>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://rastreador-tj5b.onrender.com";

    const chatBox = document.getElementById("chatBox");
    const inputMensaje = document.getElementById("mensaje");
    const inputCPK = document.getElementById("cpk");
    const rastreoResultado = document.getElementById("rastreoResultado");
    const btnEnviar = document.getElementById("btnEnviar");
    const btnBuscarCPK = document.getElementById("btnBuscarCPK");

    function addMessage(texto, tipo) {
      const div = document.createElement("div");
      div.className = "msg " + tipo;
      div.textContent = texto;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function enviarMensaje() {
      const mensaje = inputMensaje.value.trim();
      if (!mensaje) return;

      addMessage(mensaje, "user");
      inputMensaje.value = "";
      btnEnviar.disabled = true;

      try {
        const res = await fetch(`${BACKEND_URL}/api/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ mensaje: mensaje })
        });

        const rawText = await res.text();
        let data = null;

        try {
          data = JSON.parse(rawText);
        } catch (e) {
          data = null;
        }

        if (!res.ok) {
          addMessage(data?.mensaje || `Error del servidor (${res.status})`, "bot");
          return;
        }

        if (!data) {
          addMessage("El servidor respondió con un formato no válido.", "bot");
          return;
        }

        if (!data.ok) {
          addMessage(data.mensaje || "No se pudo procesar la solicitud.", "bot");
          return;
        }

        addMessage(
          data.respuesta || data.reply || data.answer || data.message || "Sin respuesta.",
          "bot"
        );

      } catch (error) {
        addMessage("No fue posible conectar con el servidor.", "bot");
        console.error("Error chat:", error);
      } finally {
        btnEnviar.disabled = false;
      }
    }

    function preguntaRapida(texto) {
      inputMensaje.value = texto;
      enviarMensaje();
    }

    async function buscarCPK() {
      const cpk = (inputCPK.value || "").replace(/\D/g, "");
      if (!cpk) {
        rastreoResultado.textContent = "Escriba un CPK válido.";
        return;
      }

      rastreoResultado.textContent = "Buscando...";
      btnBuscarCPK.disabled = true;

      try {
        const res = await fetch(`${BACKEND_URL}/api/rastreo/${cpk}`);
        const rawText = await res.text();
        let data = null;

        try {
          data = JSON.parse(rawText);
        } catch (e) {
          data = null;
        }

        if (!res.ok) {
          rastreoResultado.textContent = data?.mensaje || `Error del servidor (${res.status})`;
          return;
        }

        if (!data) {
          rastreoResultado.textContent = "El servidor respondió con un formato no válido.";
          return;
        }

        if (!data.ok) {
          rastreoResultado.textContent = data.mensaje || "No se encontró el CPK.";
          return;
        }

        rastreoResultado.innerHTML = `
          <div class="estado">${data.estado || ""}</div>
          <div><strong>CPK:</strong> ${data.cpk || cpk}</div>
          <div><strong>Fecha:</strong> ${data.fecha || "No disponible"}</div>
          <div style="margin-top:10px;">${data.descripcion || ""}</div>
        `;
      } catch (error) {
        rastreoResultado.textContent = "No fue posible conectar con el servidor.";
        console.error("Error rastreo:", error);
      } finally {
        btnBuscarCPK.disabled = false;
      }
    }

    inputMensaje.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        enviarMensaje();
      }
    });

    inputCPK.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        buscarCPK();
      }
    });

    btnEnviar.addEventListener("click", enviarMensaje);
    btnBuscarCPK.addEventListener("click", buscarCPK);
  </script>
<!-- BOT CHAMBATINA -->

<style>
#chambita-bot {
  position: fixed;
  bottom: 22px;
  right: 22px;
  width: 90px;
  height: 90px;
  z-index: 9999;
  cursor: pointer;
  transition: transform 0.25s ease;
}

#chambita-bot img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 8px 18px rgba(0,0,0,0.18));
}

#chambita-bot:hover {
  transform: scale(1.05) translateY(-4px);
}

#chambita-text {
  position: fixed;
  bottom: 120px;
  right: 28px;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  font-family: Arial;
}
</style>

<div id="chambita-text">Pregúntame</div>

<div id="chambita-bot" onclick="abrirChat()">
  <img src="/robot.png" alt="Chambatina Bot">
</div>

<script>
function abrirChat() {
  const chat = document.querySelector('#chat-container'); // ajusta si tu chat tiene otro id
  if (chat) {
    chat.style.display = 'block';
  }
}
</script>

<!-- FIN BOT -->
</body>
</html>
