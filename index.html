<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chambatina</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f5f7;
      color: #111827;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: linear-gradient(135deg, #ffffff, #f9fafb, #fff7e6);
    }

    .container {
      max-width: 900px;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      margin: 0;
    }

    h2 {
      font-size: 24px;
      margin-top: 10px;
      color: #1f2937;
    }

    p {
      margin-top: 20px;
      color: #4b5563;
    }

    .buttons {
      margin-top: 30px;
    }

    button {
      padding: 15px 25px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin: 10px;
      font-size: 16px;
    }

    .primary {
      background: #111827;
      color: white;
    }

    .secondary {
      background: white;
      border: 1px solid #ddd;
    }

    .card {
      margin-top: 40px;
      padding: 20px;
      border-radius: 20px;
      background: #0f172a;
      color: white;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 60%;
      margin-right: 10px;
    }

    .search-btn {
      background: #f59e0b;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="hero">
  <div class="container">

    <h1>Chambatina</h1>

    <h2>Envíos a Cuba y soluciones de energía con confianza</h2>

    <p>
      Rastrea tus paquetes, consulta servicios y recibe orientación clara
      sobre logística y sistemas solares.
    </p>

    <div class="buttons">
      <button class="primary">Rastrear paquete</button>
      <button class="secondary">Ver servicios</button>
    </div>

    <div class="card">
      <h3>Rastreo rápido</h3>

      <input placeholder="Introduce tu CPK">
      <button class="search-btn">Buscar</button>

    </div>

  </div>
</div>

</body>
</html>
