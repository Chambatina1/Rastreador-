<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chambatina Rastreador</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1e40af;
    }

    .resultado {
      margin-top: 20px;
      text-align: left;
    }

    .tarjeta {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      margin-bottom: 10px;
    }

    .estado {
      font-weight: bold;
      color: #1d4ed8;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Rastreador Chambatina</h1>

  <input id="inputBusqueda" placeholder="Ingrese CPK o carnet">
  <button onclick="buscar()">BUSCAR</button>

  <div id="resultado" class="resultado"></div>
</div>

<script>
async function buscar() {
  const valor = document.getElementById("inputBusqueda").value.trim();
  const box = document.getElementById("resultado");

  if (!valor) {
    box.innerHTML = "<p class='error'>Ingrese un CPK o carnet</p>";
    return;
  }

  box.innerHTML = "<p>Buscando...</p>";

  try {
    const res = await fetch(`/api/buscar/${encodeURIComponent(valor)}`);
    const data = await res.json();

    console.log("Respuesta:", data);

    if (!data.ok) {
      box.innerHTML = `<p class="error">${data.mensaje}</p>`;
      return;
    }

    // 🔹 CPK único
    if (data.tipoBusqueda === "cpk") {
      box.innerHTML = `
        <div class="tarjeta">
          <h3>CPK: ${data.cpk}</h3>
          <p class="estado">${data.estado}</p>
          <p><strong>Fecha:</strong> ${data.fecha}</p>
          <p><strong>Descripción:</strong> ${data.descripcion}</p>
          <p><strong>Nombre:</strong> ${data.nombre}</p>
        </div>
      `;
      return;
    }

    // 🔹 Carnet o Kanguro (lista)
    if (data.resultados && data.resultados.length > 0) {
      box.innerHTML = data.resultados.map(item => `
        <div class="tarjeta">
          <h3>CPK: ${item.cpk}</h3>
          <p class="estado">${item.estado}</p>
          <p><strong>Fecha:</strong> ${item.fecha || "-"}</p>
          <p><strong>Descripción:</strong> ${item.descripcion || "-"}</p>
          <p><strong>Cliente:</strong> ${item.nombre || item.cliente || "-"}</p>
        </div>
      `).join("");
      return;
    }

    box.innerHTML = "<p>No hay resultados.</p>";

  } catch (error) {
    console.error(error);
    box.innerHTML = "<p class='error'>Error conectando con el servidor</p>";
  }
}
</script>

</body>
</html>
