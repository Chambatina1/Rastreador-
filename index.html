<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chambatina</title>

<!-- ICONOS -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="chambita.png">
<link rel="apple-touch-icon" href="chambita.png">

<meta name="theme-color" content="#f59e0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Chambatina">

<style>
:root{
  --bg:#f7f1df;
  --panel:#fff6e8;
  --panel-2:#fbf2e4;
  --text:#5f4d3f;
  --muted:#8d7a68;
  --line:#ecdcc6;

  /* 🔥 NUEVO NARANJA VIVO */
  --primary:#f59e0b;
  --primary-dark:#d97706;

  --mint:#b8ddb0;
  --mint-soft:#eff8ec;
  --aqua:#9fd9d3;
  --danger:#cf8f7c;
  --shadow:0 20px 60px rgba(123,96,72,.10);
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:720px;
  margin:0 auto;
  padding:20px;
}

.logo{
  text-align:center;
}

.logo img{
  width:110px;
  border-radius:50%;
  background:#fff;
  padding:6px;
  box-shadow:var(--shadow);
}

h1{
  text-align:center;
  color:var(--primary-dark);
}

.subtitle{
  text-align:center;
  color:var(--muted);
}

.box{
  background:var(--panel);
  border-radius:20px;
  box-shadow:var(--shadow);
  overflow:hidden;
}

.chat-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-bottom:1px solid var(--line);
}

.chat-avatar{
  width:50px;
  border-radius:50%;
}

.chat-content{
  padding:12px;
}

#chatBox{
  min-height:200px;
  max-height:300px;
  overflow:auto;
  background:var(--panel-2);
  padding:10px;
  border-radius:10px;
}

.msg{
  margin:8px 0;
  padding:10px;
  border-radius:10px;
}

.bot{
  background:#f4ead8;
}

.user{
  background:var(--primary);
  font-weight:bold;
  margin-left:auto;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid var(--line);
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:var(--primary-dark);
  color:#fff;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="chambita.png">
  </div>

  <h1>Chambatina</h1>
  <div class="subtitle">Consulta tu envío</div>

  <div class="box">

    <div class="chat-header">
      <img src="chambita.png" class="chat-avatar">
      <div>
        <strong>Chambita</strong><br>
        Asistente
      </div>
    </div>

    <div class="chat-content">

      <div id="chatBox">
        <div class="msg bot">Escribe tu número o pregunta</div>
      </div>

      <input id="mensaje" placeholder="Ej: 1234567">

      <button onclick="procesar()">Enviar</button>

    </div>
  </div>
</div>

<script>
const BACKEND_URL = "https://rastreador-tj5b.onrender.com";

function addMessage(texto,tipo){
  let div=document.createElement("div");
  div.className="msg "+tipo;
  div.textContent=texto;
  chatBox.appendChild(div);
}

async function procesar(){
  let msg=document.getElementById("mensaje").value;
  addMessage(msg,"user");

  let res=await fetch(BACKEND_URL+"/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mensaje:msg})
  });

  let data=await res.json();
  addMessage(data.respuesta,"bot");
}
</script>

</body>
</html>
