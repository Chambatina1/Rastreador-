<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rastreador Chambatina</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#111;
      color:#fff;
      margin:0;
      padding:40px 20px;
    }
    .box{
      max-width:800px;
      margin:0 auto;
      background:#1b1b1b;
      border-radius:16px;
      padding:25px;
    }
    h1{
      text-align:center;
      color:orange;
    }
    .fila{
      display:flex;
      gap:10px;
      margin-top:20px;
    }
    input{
      flex:1;
      padding:14px;
      font-size:16px;
      border-radius:10px;
      border:1px solid #444;
      background:#0f0f0f;
      color:white;
    }
    button{
      padding:14px 20px;
      font-size:16px;
      font-weight:bold;
      border:none;
      border-radius:10px;
      background:orange;
      color:black;
      cursor:pointer;
    }
    #resultado{
      margin-top:20px;
      padding:16px;
      border-radius:10px;
      background:#101010;
      border:1px solid #333;
      min-height:28px;
      white-space:pre-line;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Rastreador Chambatina</h1>

    <div class="fila">
      <input id="cpk" type="text" placeholder="Ejemplo: 260443">
      <button type="button" id="btnBuscar">Buscar</button>
    </div>

    <div id="resultado">Escribe tu número y pulsa Buscar.</div>
  </div>

  <script>
    document.getElementById("btnBuscar").addEventListener("click", async function () {
      const cpk = document.getElementById("cpk").value.trim().replace(/\D/g, "");
      const resultado = document.getElementById("resultado");

      resultado.textContent = "Botón funcionando...";

      if (!cpk) {
        resultado.textContent = "Escribe un número válido.";
        return;
      }

      try {
        const url = "https://rastreador-tj5b.onrender.com/api/rastreo/" + cpk;
        const res = await fetch(url);
        const data = await res.json();

        if (!data.ok) {
          resultado.textContent = data.mensaje || "No se encontró el paquete.";
          return;
        }

        resultado.textContent = "Estado: " + data.estado + "\n\n" + data.descripcion;
      } catch (e) {
        resultado.textContent = "Error de conexión.";
        console.error(e);
      }
    });
  </script>
</body>
</html>
