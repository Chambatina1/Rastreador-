<!DOCTYPE html>

  <title>Rastreador Chambatina</title>

      margin-bottom:20px;

    .card{
      background:#fff;
      border-radius:16px;
      padding:20px;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
    }
    h1,h2,p{margin-top:0}
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    input,button{
      font:inherit;
      padding:14px;
      border-radius:12px;
      border:1px solid #d8d8d8;
      box-sizing:border-box;
    }
    input{
      flex:1 1 320px;
      min-width:220px;
    }
    button{
      background:#111;
      color:#fff;
      border:none;
      cursor:pointer;
      font-weight:700;
      min-width:140px;
    }
    #resultado{
      margin-top:16px;
    }
    .box{
      background:#fff4ec;
      padding:14px;
      border-left:5px solid #f26b00;
      border-radius:10px;
      line-height:1.45;
    }
    .ok{
      border-left-color:#2e7d32;
      background:#eef8f0;
    }
    .tag{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:#ffe4cf;
      color:#a34900;
      font-size:13px;
      font-weight:700;
      margin-bottom:8px;
    }
    .entregado{
      color:#2e7d32;
      font-size:30px;
      font-weight:800;
      letter-spacing:.5px;
      margin-bottom:8px;
    }
    .small{
      color:#666;
      font-size:13px;
      margin-top:12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Rastreo de Paquetería Chambatina</h1>
      <p>Escriba su número CPK sin letras. Ejemplo: 0259555</p>
    </section>

    <section class="card">
      <h2>Consultar envío</h2>
      <div class="row">
        <input id="cpkInput" type="text" placeholder="Ingrese su CPK" />
        <button id="btnBuscar" type="button">Buscar</button>
      </div>
      <div id="resultado"></div>
      <div class="small">
        Este archivo está preparado para GitHub Pages. Solo necesita llamarse <b>index.html</b>.
      </div>
    </section>
  </div>

  <script>
  (function(){
    function normalizarEspacios(s){
      return String(s || "").replace(/\s+/g, " ").trim();
    }

    function limpiarCPK(v){
      return String(v || "").replace(/\D/g, "");
    }

    function tieneCPK(linea){
      return /CPK-\d+/i.test(linea || "");
    }

    function tieneFecha(linea){
      return /\d{4}-\d{2}-\d{2}/.test(linea || "");
    }

    function leerBaseCruda(){
      var el = document.getElementById("BASE_DATOS_CHAMBATINA");
      if(!el) return "";
      return (el.textContent || "").replace(/\r/g, "");
    }

    function parsearBaseRobusta(){
      var raw = leerBaseCruda();
      var lines = raw.split("\n").map(function(l){ return l.trim(); }).filter(Boolean);

      var fixed = [];
      for(var i=0;i<lines.length;i++){
        var cur = lines[i];
        if(tieneCPK(cur) && !tieneFecha(cur) && i < lines.length - 1){
          cur = cur + " " + lines[i+1];
          i++;
        }
        fixed.push(cur);
      }
      return fixed;
    }

    function extraerFecha(linea){
      var m = (linea || "").match(/\d{4}-\d{2}-\d{2}/);
      return m ? new Date(m[0] + "T00:00:00") : null;
    }

    function diasHabiles(desde, hasta){
      var d = new Date(desde.getTime());
      var c = 0;
      while(d <= hasta){
        var day = d.getDay();
        if(day !== 0 && day !== 6) c++;
        d.setDate(d.getDate() + 1);
      }
      return c;
    }

    function detectarEstado(linea){
      var L = (linea || "").toUpperCase();
      var estados = [
        "ENTREGADO",
        "ENTREGADO PP",
        "EN AGENCIA",
        "EN ALMACEN",
        "EN ALMACÉN",
        "EN DISTRIBUCION",
        "EN DISTRIBUCIÓN",
        "EN ESPERA DE TRANSITO",
        "EN TRANSITO",
        "EN TRÁNSITO",
        "CLASIFICADO",
        "ARRIBO",
        "DESPACHADO",
        "DESPACHO",
        "PENDIENTE DESAGRUPE",
        "DESAGRUPE",
        "CANAL ROJO"
      ];
      for(var i=0;i<estados.length;i++){
        if(L.indexOf(estados[i]) !== -1){
          return estados[i]
            .replace("EN TRÁNSITO","EN TRANSITO")
            .replace("EN ALMACÉN","EN ALMACEN")
            .replace("EN DISTRIBUCIÓN","EN DISTRIBUCION");
        }
      }
      return "EN PROCESO";
    }

    function extraerMercancia(linea){
      var m = (linea || "").match(/ENVIO\s+(.+?)\s+\d{4}-\d{2}-\d{2}/i);
      if(m) return normalizarEspacios(m[1]);
      var m2 = (linea || "").match(/ENVIO\s+(.+)$/i);
      return m2 ? normalizarEspacios(m2[1]) : "No especificada";
    }

    function movimientoLogistico(dias){
      if(dias <= 3) return "Fase inicial de preparación y consolidación. Los bultos se agrupan para organizar su salida.";
      if(dias <= 7) return "El bulto viaja dentro del contenedor junto a otras cargas con destino al país.";
      if(dias <= 9) return "El contenedor ya arribó al país y está en proceso de descarga para continuar etapas logísticas.";
      if(dias <= 15) return "Extracción del contenedor y paso por revisión de aduana y controles correspondientes.";
      if(dias <= 25) return "Organizado y clasificado por región o provincia, preparándose para traslado interno.";
      if(dias <= 35) return "Traslado interno hacia su provincia o área de destino.";
      return "Sigue en distribución. Por volumen y procesos logísticos o aduanales, esta etapa puede extenderse.";
    }

    function mensajeRetraso(){
      return "Su envío sigue en proceso. Cuando el volumen operativo o la revisión logística aumenta, el movimiento puede tardar más de lo habitual, pero el registro continúa activo.";
    }

    function mensajePorEstadoYDias(estado, dias){
      if(estado === "ENTREGADO" || estado === "ENTREGADO PP"){
        return "Su paquete fue entregado correctamente. Gracias por confiar en Chambatina.";
      }
      if(estado === "EN AGENCIA"){
        return "Su paquete ya se encuentra en agencia y entra en coordinación para entrega o recogida según la operación local.";
      }
      if(estado === "EN ALMACEN"){
        return "Su paquete se encuentra resguardado en almacén y pendiente del siguiente movimiento interno.";
      }
      if(estado === "EN DISTRIBUCION"){
        return "Su envío está en distribución hacia la zona final.";
      }
      if(estado === "PENDIENTE DESAGRUPE" || estado === "DESAGRUPE"){
        return "Su bulto está pendiente de separación del consolidado para continuar la ruta.";
      }
      if(estado === "DESPACHO" || estado === "DESPACHADO"){
        return "Su envío está en fase de despacho y sigue avanzando dentro del proceso logístico.";
      }
      if(estado === "CLASIFICADO"){
        return "Su paquete ya fue clasificado por zona o ruta para continuar el tránsito interno.";
      }
      if(estado === "CANAL ROJO"){
        return "Su envío está bajo revisión adicional. Esto puede extender un poco más el tiempo.";
      }
      if(estado === "EN ESPERA DE TRANSITO" || estado === "EN TRANSITO"){
        return "Su paquete está pendiente o en curso de traslado hacia la siguiente etapa logística.";
      }
      if(estado === "ARRIBO"){
        return "Su envío registra arribo a una nueva etapa del proceso.";
      }
      return dias <= 35
        ? "Su envío continúa en proceso logístico normal."
        : mensajeRetraso();
    }

    function buscarCPK(){
      var input = document.getElementById("cpkInput");
      var res = document.getElementById("resultado");
      var cpk = limpiarCPK(input.value);

      if(!cpk){
        res.innerHTML = "<div class='box'>Escriba un número CPK válido.</div>";
        return;
      }

      var base = parsearBaseRobusta();
      var hoy = new Date();

      for(var i=0;i<base.length;i++){
        var linea = base[i];
        if(linea.indexOf("CPK-" + cpk) !== -1){
          var estado = detectarEstado(linea);
          var mercancia = extraerMercancia(linea);
          var fecha = extraerFecha(linea);
          var dias = fecha ? diasHabiles(fecha, hoy) : null;

          var mensajeFinal;
          if(estado !== "ENTREGADO" && estado !== "ENTREGADO PP" && dias !== null && dias > 35){
            mensajeFinal = mensajeRetraso();
          } else if(dias !== null){
            mensajeFinal = mensajePorEstadoYDias(estado, dias);
          } else {
            mensajeFinal = "Registro encontrado, pero falta la fecha en la línea.";
          }

          var colorClass = (estado === "ENTREGADO" || estado === "ENTREGADO PP") ? "box ok" : "box";

          if(estado === "ENTREGADO" || estado === "ENTREGADO PP"){
            res.innerHTML =
              "<div class='" + colorClass + "'>" +
                "<div class='entregado'>ENTREGADO</div>" +
                "<div><b>CPK:</b> " + cpk + "</div>" +
                "<div><b>Mercancía:</b> " + mercancia + "</div>" +
                "<div style='margin-top:10px'>" + mensajeFinal + "</div>" +
              "</div>";
            return;
          }

          res.innerHTML =
            "<div class='" + colorClass + "'>" +
              "<div class='tag'>" + estado + "</div>" +
              "<div><b>CPK:</b> " + cpk + "</div>" +
              "<div><b>Mercancía:</b> " + mercancia + "</div>" +
              "<hr style='border:none;border-top:1px solid rgba(0,0,0,.12);margin:10px 0'>" +
              "<div><b>Movimiento logístico:</b><br>" +
                (dias !== null ? movimientoLogistico(dias) : "No disponible.") +
              "</div>" +
              "<div style='margin-top:10px'><b>Situación actual de su envío:</b><br>" + mensajeFinal + "</div>" +
            "</div>";
          return;
        }
      }

      res.innerHTML = "<div class='box'>No se encontraron envíos activos con ese número.</div>";
    }

    document.addEventListener("DOMContentLoaded", function(){
      var btn = document.getElementById("btnBuscar");
      var input = document.getElementById("cpkInput");
      if(btn) btn.addEventListener("click", buscarCPK);
      if(input){
        input.addEventListener("keydown", function(e){
          if(e.key === "Enter"){
            e.preventDefault();
            buscarCPK();
          }
        });
      }
    });
  })();
  </script>
