<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chambatina Chat</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    padding: 40px;
}

#chatbox {
    width: 90%;
    max-width: 500px;
    margin: auto;
}

input {
    width: 80%;
    padding: 10px;
    border: none;
    border-radius: 5px;
}

button {
    padding: 10px;
    background: orange;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

#respuesta {
    margin-top: 20px;
    background: #222;
    padding: 15px;
    border-radius: 10px;
}
</style>

</head>
<body>

<h2>Chat Chambatina</h2>

<div id="chatbox">
    <input id="mensaje" placeholder="Escribe tu pregunta..." />
    <button onclick="enviar()">Enviar</button>

    <div id="respuesta"></div>
</div>

<script>
async function enviar() {
    const mensaje = document.getElementById("mensaje").value;

    const res = await fetch("https://rastreador-tj5b.onrender.com/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: mensaje })
    });

    const data = await res.json();

    document.getElementById("respuesta").innerText = data.reply;
}
</script>

</body>
</html>
