<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chambatina</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f6f7f9;
  color:#111827;
}

.container{
  max-width:680px;
  margin:0 auto;
  padding:20px 14px 60px;
}

.logo{
  text-align:center;
  margin-bottom:14px;
}

.logo img{
  width:90px;
  height:90px;
  border-radius:50%;
  background:#fff;
  padding:4px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h1{
  text-align:center;
  margin:10px 0 4px;
  font-size:34px;
  color:#f59e0b;
}

.subtitle{
  text-align:center;
  font-size:18px;
  color:#6b7280;
  margin-bottom:20px;
}

.box{
  background:#fff;
  border-radius:20px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

#chatBox{
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:16px;
  min-height:220px;
  max-height:320px;
  overflow-y:auto;
  padding:12px;
  margin-bottom:14px;
}

.msg{
  max-width:85%;
  padding:12px 14px;
  border-radius:16px;
  margin:8px 0;
  font-size:17px;
}

.bot{
  background:#eef2f7;
}

.user{
  background:#f59e0b;
  font-weight:700;
  margin-left:auto;
}

input{
  width:100%;
  height:56px;
  border-radius:14px;
  border:1px solid #d1d5db;
  padding:12px;
  font-size:18px;
  margin-bottom:10px;
}

button{
  width:100%;
  height:56px;
  border:none;
  border-radius:14px;
  background:#f59e0b;
  font-size:20px;
  font-weight:800;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="./logo-chambatina.png" alt="Chambatina">
  </div>

  <h1>Chambatina</h1>
  <div class="subtitle">
    Consulte su paquete o haga su pregunta
  </div>

  <div class="box">

    <div id="chatBox">
      <div class="msg bot">
        Escriba su número CPK o su pregunta.
      </div>
    </div>

    <input id="mensaje" placeholder="Ej: 123456 o ¿precio de envío?" />

    <button onclick="procesar()">Enviar</button>

  </div>

</div>

<script>
const BACKEND_URL = "https://rastreador-tj5b.onrender.com";

const chatBox = document.getElementById("chatBox");
const input = document.getElementById("mensaje");

function addMessage(texto, tipo){
  const div = document.createElement("div");
  div.className = "msg " + tipo;
  div.textContent = texto;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function esCPK(texto){
  const limpio = texto.replace(/\D/g,"");
  return limpio.length >= 4 && limpio.length <= 10;
}

async function procesar(){
  const mensaje = input.value.trim();
  if(!mensaje) return;

  addMessage(mensaje,"user");
  input.value = "";

  if(esCPK(mensaje)){
    buscarCPK(mensaje);
  }else{
    enviarChat(mensaje);
  }
}

async function enviarChat(mensaje){
  try{
    const res = await fetch(`${BACKEND_URL}/api/chat`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({mensaje})
    });

    const data = await res.json();
    addMessage(data.respuesta || "Sin respuesta","bot");

  }catch(e){
    addMessage("No se pudo conectar","bot");
  }
}

async function buscarCPK(codigo){
  const cpk = codigo.replace(/\D/g,"");

  try{
    const res = await fetch(`${BACKEND_URL}/api/rastreo/${cpk}`);
    const data = await res.json();

    if(!data.ok){
      addMessage("No se encontró el paquete","bot");
      return;
    }

    addMessage(
      "Estado: " + data.estado +
      "\nFecha: " + (data.fecha || "") +
      "\n" + (data.descripcion || ""),
      "bot"
    );

  }catch(e){
    addMessage("Error al buscar el paquete","bot");
  }
}

input.addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    e.preventDefault();
    procesar();
  }
});
</script>

</body>
</html>
