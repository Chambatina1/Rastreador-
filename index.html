<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chambatina</title>
  <meta name="theme-color" content="#f59e0b" />
  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#f3f4f6;
      color:#111827;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:24px 14px 50px;
    }

    .top{
      text-align:center;
      margin-bottom:18px;
    }

    .logo-shell{
      width:160px;
      height:100px;
      margin:0 auto 12px;
      background:#fff;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 28px rgba(0,0,0,.08);
    }

    .logo-shell img{
      width:76px;
      height:76px;
      object-fit:contain;
      display:block;
    }

    h1{
      margin:0 0 6px;
      font-size:36px;
      color:#f59e0b;
      font-weight:800;
    }

    .sub{
      margin:0;
      color:#6b7280;
      font-size:18px;
    }

    .card{
      background:#fff;
      border-radius:24px;
      border:1px solid #ececec;
      box-shadow:0 12px 34px rgba(0,0,0,.08);
      overflow:hidden;
    }

    .head{
      display:flex;
      align-items:center;
      gap:14px;
      padding:20px;
      border-bottom:1px solid #ececec;
    }

    .head-avatar{
      width:74px;
      height:74px;
      border-radius:50%;
      background:#fafafa;
      border:1px solid #f0f0f0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }

    .head-avatar img{
      width:42px;
      height:42px;
      object-fit:contain;
    }

    .head-text h2{
      margin:0;
      font-size:24px;
      font-weight:800;
    }

    .head-text p{
      margin:6px 0 0;
      font-size:16px;
      color:#6b7280;
    }

    .body{
      padding:20px;
    }

    .panel{
      border:1px solid #e5e7eb;
      border-radius:20px;
      background:#fafafa;
      padding:18px;
    }

    .question-box{
      width:100%;
      height:62px;
      border:2px solid #f59e0b;
      border-radius:16px;
      background:#fff;
      color:#111827;
      font-size:20px;
      padding:0 16px;
      outline:none;
      margin-bottom:16px;
      display:block;
    }

    .question-box:focus{
      border-color:#d97706;
      box-shadow:0 0 0 3px rgba(245,158,11,.15);
    }

    .answer-box{
      min-height:220px;
      background:#e9edf3;
      border-radius:16px;
      padding:18px;
      font-size:20px;
      line-height:1.45;
      white-space:pre-line;
      margin-bottom:16px;
    }

    .main-btn{
      width:100%;
      height:54px;
      border:none;
      border-radius:16px;
      background:#f59e0b;
      color:#111827;
      font-size:19px;
      font-weight:800;
      cursor:pointer;
    }

    .main-btn:disabled,
    .question-box:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    @media (max-width:700px){
      .wrap{
        padding:14px 10px 40px;
      }

      .logo-shell{
        width:145px;
        height:92px;
      }

      .logo-shell img{
        width:64px;
        height:64px;
      }

      h1{
        font-size:30px;
      }

      .sub{
        font-size:16px;
      }

      .head{
        padding:16px;
      }

      .head-text h2{
        font-size:19px;
      }

      .head-text p{
        font-size:14px;
      }

      .body{
        padding:16px;
      }

      .panel{
        padding:16px;
      }

      .question-box{
        height:56px;
        font-size:18px;
      }

      .answer-box{
        min-height:200px;
        font-size:17px;
      }

      .main-btn{
        height:52px;
        font-size:17px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="logo-shell">
        <img src="public/chambita.png" alt="Chambatina">
      </div>
      <h1>Chambatina</h1>
      <p class="sub">Consulte su paquete o haga su pregunta</p>
    </div>

    <div class="card">
      <div class="head">
        <div class="head-avatar">
          <img src="public/chambita.png" alt="Chambita">
        </div>
        <div class="head-text">
          <h2>Chambita</h2>
          <p>Asistente virtual</p>
        </div>
      </div>

      <div class="body">
        <div class="panel">
          <input
            id="mensaje"
            class="question-box"
            type="text"
            placeholder="Escriba su CPK o su pregunta"
            autocomplete="off"
          />

          <div id="respuesta" class="answer-box">Escriba su número CPK o su pregunta y toque Enviar.</div>

          <button id="btnEnviar" class="main-btn" type="button">Enviar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://rastreador-tj5b.onrender.com";

    const mensaje = document.getElementById("mensaje");
    const respuesta = document.getElementById("respuesta");
    const btnEnviar = document.getElementById("btnEnviar");

    let procesando = false;

    function normalizarNumero(texto){
      return String(texto || "").replace(/\D/g, "");
    }

    function esCPK(texto){
      const limpio = normalizarNumero(texto);
      return limpio.length >= 6 && limpio.length <= 10;
    }

    function setProcesando(valor){
      procesando = valor;
      mensaje.disabled = valor;
      btnEnviar.disabled = valor;
      btnEnviar.textContent = valor ? "Consultando..." : "Enviar";
    }

    function ponerRespuesta(texto){
      respuesta.textContent = texto;
    }

    async function enviarChat(texto){
      try{
        const res = await fetch(`${BACKEND_URL}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mensaje: texto })
        });

        const data = await res.json();

        if(!res.ok || !data.ok){
          ponerRespuesta(data.mensaje || "No se pudo procesar la pregunta.");
          return;
        }

        ponerRespuesta(data.respuesta || "Sin respuesta.");
      }catch(error){
        ponerRespuesta("No se pudo conectar con el asistente.");
      }
    }

    async function buscarCPK(codigo){
      const cpk = normalizarNumero(codigo);

      try{
        const res = await fetch(`${BACKEND_URL}/api/rastreo/${cpk}`);
        const data = await res.json();

        if(!res.ok || !data.ok){
          ponerRespuesta(data.mensaje || "No se encontró el paquete.");
          return;
        }

        const texto =
          (data.saludo || ("Hola, tu mercancía se encuentra en: " + data.estado + ".")) +
          "\\n\\nFecha: " + (data.fecha || "No disponible") +
          "\\n\\nDescripción:\\n" + (data.descripcion || "Sin descripción disponible.");

        ponerRespuesta(texto);
      }catch(error){
        ponerRespuesta("Error al buscar el paquete.");
      }
    }

    async function procesar(){
      if(procesando) return;

      const texto = mensaje.value.trim();
      if(!texto) return;

      setProcesando(true);

      try{
        if(esCPK(texto)){
          await buscarCPK(texto);
        }else{
          await enviarChat(texto);
        }
      }finally{
        setProcesando(false);
        mensaje.focus();
      }
    }

    btnEnviar.addEventListener("click", procesar);

    mensaje.addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        e.preventDefault();
        procesar();
      }
    });

    window.addEventListener("load", function(){
      mensaje.disabled = false;
      mensaje.focus();
    });
  </script>
</body>
</html>
