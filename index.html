<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chambatina</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Chambatina">
  <link rel="apple-touch-icon" href="public/chambatinaapp.png">

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f3f4f6;
      color:#111827;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:20px 14px 70px;
    }

    .top{
      text-align:center;
      margin-bottom:18px;
    }

    .logo-shell{
      width:160px;
      height:100px;
      margin:0 auto 12px;
      background:#fff;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 28px rgba(0,0,0,.08);
    }

    .logo-shell img{
      width:76px;
      height:76px;
      object-fit:contain;
      display:block;
    }

    h1{
      margin:0 0 6px;
      font-size:36px;
      color:#f59e0b;
      font-weight:800;
    }

    .sub{
      margin:0;
      color:#6b7280;
      font-size:18px;
    }

    .card{
      background:#fff;
      border-radius:26px;
      overflow:hidden;
      box-shadow:0 12px 34px rgba(0,0,0,.08);
      border:1px solid #ececec;
    }

    .head{
      display:flex;
      align-items:center;
      gap:14px;
      padding:20px;
      border-bottom:1px solid #ececec;
    }

    .head-avatar{
      width:84px;
      height:84px;
      border-radius:50%;
      background:#fafafa;
      border:1px solid #f0f0f0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }

    .head-avatar img{
      width:50px;
      height:50px;
      object-fit:contain;
    }

    .head-text h2{
      margin:0;
      font-size:24px;
      font-weight:800;
    }

    .head-text p{
      margin:6px 0 0;
      font-size:16px;
      color:#6b7280;
    }

    .body{
      padding:20px;
    }

    .panel{
      border:1px solid #e5e7eb;
      border-radius:22px;
      background:#fafafa;
      padding:18px;
    }

    .question-box{
      display:block;
      width:100%;
      height:64px;
      border:none;
      outline:none;
      border-radius:18px;
      background:#f59e0b;
      color:#111827;
      font-size:22px;
      font-weight:700;
      padding:0 18px;
      margin:0 0 16px 0;
      -webkit-appearance:none;
      appearance:none;
    }

    .question-box::placeholder{
      color:#5b4b2a;
      opacity:1;
    }

    .answer-box{
      min-height:230px;
      background:#e9edf3;
      border-radius:18px;
      padding:20px;
      font-size:22px;
      line-height:1.45;
      white-space:pre-line;
      margin-bottom:16px;
    }

    .main-btn{
      width:100%;
      height:56px;
      border:none;
      border-radius:18px;
      background:#f59e0b;
      color:#111827;
      font-size:20px;
      font-weight:800;
      cursor:pointer;
    }

    .main-btn:disabled,
    .question-box:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .ios-tip{
      display:none;
      margin-top:14px;
      background:#fff7ed;
      border:1px solid #fdba74;
      color:#9a3412;
      border-radius:16px;
      padding:14px 16px;
      font-size:14px;
      line-height:1.45;
    }

    @media (max-width:700px){
      .wrap{
        padding:14px 10px 60px;
      }

      .logo-shell{
        width:145px;
        height:92px;
      }

      .logo-shell img{
        width:64px;
        height:64px;
      }

      h1{
        font-size:30px;
      }

      .sub{
        font-size:16px;
      }

      .head{
        padding:16px;
      }

      .head-avatar{
        width:72px;
        height:72px;
      }

      .head-avatar img{
        width:42px;
        height:42px;
      }

      .head-text h2{
        font-size:19px;
      }

      .head-text p{
        font-size:14px;
      }

      .body{
        padding:16px;
      }

      .panel{
        padding:16px;
      }

      .question-box{
        height:58px;
        font-size:18px;
        padding:0 16px;
      }

      .answer-box{
        min-height:210px;
        font-size:17px;
        padding:18px;
      }

      .main-btn{
        height:52px;
        font-size:17px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="logo-shell">
        <img src="public/chambita.png" alt="Chambatina">
      </div>
      <h1>Chambatina</h1>
      <p class="sub">Consulte su paquete o haga su pregunta</p>
    </div>

    <div class="card">
      <div class="head">
        <div class="head-avatar">
          <img src="public/chambita.png" alt="Chambita">
        </div>
        <div class="head-text">
          <h2>Chambita</h2>
          <p>Asistente virtual</p>
        </div>
      </div>

      <div class="body">
        <div class="panel">
          <input
            id="mensaje"
            class="question-box"
            type="text"
            placeholder="Escriba su CPK o su pregunta"
          >

          <div id="respuesta" class="answer-box">Escriba su número CPK o su pregunta y toque Enviar.</div>

          <button id="btnEnviar" class="main-btn" type="button">Enviar</button>

          <div id="iosTip" class="ios-tip">
            En iPhone, abra esta página en Safari, toque Compartir y luego “Agregar a pantalla de inicio”.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://rastreador-tj5b.onrender.com";

    const mensaje = document.getElementById("mensaje");
    const respuesta = document.getElementById("respuesta");
    const btnEnviar = document.getElementById("btnEnviar");
    const iosTip = document.getElementById("iosTip");

    let procesando = false;

    function normalizarNumero(texto){
      return String(texto || "").replace(/\D/g, "");
    }

    function esCPK(texto){
      const limpio = normalizarNumero(texto);
      return limpio.length >= 6 && limpio.length <= 10;
    }

    function setProcesando(valor){
      procesando = valor;
      mensaje.disabled = valor;
      btnEnviar.disabled = valor;
      btnEnviar.textContent = valor ? "Consultando..." : "Enviar";
    }

    function ponerRespuesta(texto){
      respuesta.textContent = texto;
    }

    async function enviarChat(texto){
      try{
        const res = await fetch(`${BACKEND_URL}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mensaje: texto })
        });

        const data = await res.json();

        if(!res.ok || !data.ok){
          ponerRespuesta(data.mensaje || "No se pudo procesar la pregunta.");
          return;
        }

        ponerRespuesta(data.respuesta || "Sin respuesta.");
      }catch(error){
        ponerRespuesta("No se pudo conectar con el asistente.");
      }
    }

    async function buscarCPK(codigo){
      const cpk = normalizarNumero(codigo);

      try{
        const res = await fetch(`${BACKEND_URL}/api/rastreo/${cpk}`);
        const data = await res.json();

        if(!res.ok || !data.ok){
          ponerRespuesta(data.mensaje || "No se encontró el paquete.");
          return;
        }

        const texto =
          (data.saludo || ("Hola, tu mercancía se encuentra en: " + data.estado + ".")) +
          "\n\nFecha: " + (data.fecha || "No disponible") +
          "\n\nDescripción:\n" + (data.descripcion || "Sin descripción disponible.");

        ponerRespuesta(texto);
      }catch(error){
        ponerRespuesta("Error al buscar el paquete.");
      }
    }

    async function procesar(){
      if(procesando) return;

      const texto = mensaje.value.trim();
      if(!texto) return;

      setProcesando(true);

      try{
        if(esCPK(texto)){
          await buscarCPK(texto);
        }else{
          await enviarChat(texto);
        }
      }finally{
        setProcesando(false);
        mensaje.focus();
      }
    }

    btnEnviar.addEventListener("click", procesar);

    mensaje.addEventListener("keypress", function(e){
      if(e.key === "Enter"){
        e.preventDefault();
        procesar();
      }
    });

    function esIOS(){
      return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
    }

    function esSafari(){
      return /^((?!chrome|android).)*safari/i.test(window.navigator.userAgent);
    }

    function estaInstalada(){
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    if(esIOS() && esSafari() && !estaInstalada()){
      iosTip.style.display = "block";
    }
  </script>
</body>
</html>
