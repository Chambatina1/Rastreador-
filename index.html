<head>

  <title>Rastreo de Paquetes Chambatina</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff8f0, #ffe7cc);
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      padding: 30px 24px;
      border: 2px solid #f28c28;
    }

    .logo {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      color: #f28c28;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #555;
      font-size: 15px;
      margin-bottom: 24px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-box input {
      flex: 1;
      min-width: 220px;
      padding: 14px 16px;
      border: 2px solid #ddd;
      border-radius: 12px;
      font-size: 17px;
      outline: none;
    }

    .search-box input:focus {
      border-color: #f28c28;
    }

    .search-box button {
      padding: 14px 22px;
      border: none;
      border-radius: 12px;
      background: #f28c28;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .search-box button:hover {
      background: #d97312;
    }

    .result {
      margin-top: 22px;
      padding: 18px;
      border-radius: 14px;
      background: #fafafa;
      border: 1px solid #eee;
      display: none;
    }

    .result.show {
      display: block;
    }

    .status {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #111;
    }

    .status.entregado {
      font-size: 34px;
      text-align: center;
      color: #0a8f3d;
    }

    .detail {
      font-size: 16px;
      line-height: 1.6;
      color: #333;
    }

    .error {
      color: #b00020;
      font-weight: bold;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 13px;
      color: #777;
      text-align: center;
    }

    @media (max-width: 600px) {
      .search-box {
        flex-direction: column;
      }

      .search-box button {
        width: 100%;
      }
    }
  </style>
</head>

      <button onclick="buscarPaquete()">Buscar</button>
    </div>

    <div id="resultado" class="result"></div>

    <div class="footer-note">
      Consulta rápida y segura del estado de tu envío

    function limpiarCodigo(valor) {
      return valor
        .toUpperCase()
        .replace(/CPK-/g, "")
        .replace(/[^0-9]/g, "")
        .trim();
    }

    function buscarPaquete() {
      const input = document.getElementById("codigoInput");
      const resultado = document.getElementById("resultado");
      const codigoBuscado = limpiarCodigo(input.value);

      resultado.className = "result show";

      if (!codigoBuscado) {
        resultado.innerHTML = '<div class="error">Por favor, escribe un código válido.</div>';
        return;
      }

      const paquete = paquetes.find(p => limpiarCodigo(p.codigo) === codigoBuscado);

      if (!paquete) {
        resultado.innerHTML = `
          <div class="error">No encontramos información para ese código.</div>
          <div class="detail" style="margin-top:8px;">
            Verifica si lo escribiste correctamente e inténtalo otra vez.
          </div>
        `;
        return;
      }

      if (paquete.estado === "ENTREGADO") {
        resultado.innerHTML = `
          <div class="status entregado">ENTREGADO</div>
        `;
        return;
      }

      resultado.innerHTML = `
        <div class="status">${paquete.estado}</div>
        <div class="detail">${paquete.mensaje}</div>
      `;
    }
