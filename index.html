<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chambatina</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f6f7f9;
  color:#111827;
}

.container{
  max-width:680px;
  margin:0 auto;
  padding:20px 14px 60px;
}

.logo{
  text-align:center;
  margin-bottom:14px;
}

.logo img{
  width:90px;
  height:90px;
  border-radius:50%;
  background:#fff;
  padding:4px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
  object-fit:contain;
}

h1{
  text-align:center;
  margin:10px 0 4px;
  font-size:34px;
  color:#f59e0b;
}

.subtitle{
  text-align:center;
  font-size:18px;
  color:#6b7280;
  margin-bottom:20px;
}

.box{
  background:#fff;
  border-radius:20px;
  padding:0;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  overflow:hidden;
}

.chat-header{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 16px;
  background:#ffffff;
  border-bottom:1px solid #e5e7eb;
}

.chat-avatar{
  width:52px;
  height:52px;
  border-radius:50%;
  object-fit:contain;
  background:#fff;
  padding:3px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  flex-shrink:0;
}

.chat-header-text h3{
  margin:0;
  font-size:18px;
  font-weight:800;
  color:#111827;
}

.chat-header-text p{
  margin:3px 0 0;
  font-size:13px;
  color:#6b7280;
}

.chat-content{
  padding:16px;
}

#chatBox{
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:16px;
  min-height:220px;
  max-height:320px;
  overflow-y:auto;
  padding:12px;
  margin-bottom:14px;
  white-space:pre-line;
}

.msg{
  max-width:85%;
  padding:12px 14px;
  border-radius:16px;
  margin:8px 0;
  font-size:17px;
  line-height:1.4;
}

.bot{
  background:#eef2f7;
  color:#111827;
}

.user{
  background:#f59e0b;
  color:#111827;
  font-weight:700;
  margin-left:auto;
}

input{
  width:100%;
  height:56px;
  border-radius:14px;
  border:1px solid #d1d5db;
  padding:12px;
  font-size:18px;
  margin-bottom:10px;
  box-sizing:border-box;
}

button{
  width:100%;
  height:56px;
  border:none;
  border-radius:14px;
  background:#f59e0b;
  font-size:20px;
  font-weight:800;
  cursor:pointer;
  color:#111827;
}

button:hover{
  opacity:.95;
}

@media (max-width:600px){
  .container{
    padding:14px 10px 40px;
  }

  .logo img{
    width:74px;
    height:74px;
  }

  h1{
    font-size:28px;
  }

  .subtitle{
    font-size:16px;
  }

  .chat-avatar{
    width:48px;
    height:48px;
  }

  .chat-header-text h3{
    font-size:16px;
  }

  .chat-header-text p{
    font-size:12px;
  }

  .msg{
    font-size:16px;
  }

  input{
    font-size:16px;
  }

  button{
    font-size:18px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="./logo-chambita.png" alt="Chambatina">
  </div>

  <h1>Chambatina</h1>
  <div class="subtitle">
    Consulte su paquete o haga su pregunta
  </div>

  <div class="box">

    <div class="chat-header">
      <img src="./logo-chambatina.png" alt="Chambita" class="chat-avatar">
      <div class="chat-header-text">
        <h3>Chambita</h3>
        <p>Asistente virtual</p>
      </div>
    </div>

    <div class="chat-content">
      <div id="chatBox">
        <div class="msg bot">
          Escriba su número CPK o su pregunta.
        </div>
      </div>

      <input id="mensaje" placeholder="Ej: 123456 o ¿precio de envío?" />

      <button onclick="procesar()">Enviar</button>
    </div>

  </div>

</div>

<script>
const BACKEND_URL = "https://rastreador-tj5b.onrender.com";

const chatBox = document.getElementById("chatBox");
const input = document.getElementById("mensaje");

function addMessage(texto, tipo){
  const div = document.createElement("div");
  div.className = "msg " + tipo;
  div.textContent = texto;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function esCPK(texto){
  const limpio = texto.replace(/\D/g,"");
  return limpio.length >= 4 && limpio.length <= 10;
}

async function procesar(){
  const mensaje = input.value.trim();
  if(!mensaje) return;

  addMessage(mensaje,"user");
  input.value = "";

  if(esCPK(mensaje)){
    buscarCPK(mensaje);
  }else{
    enviarChat(mensaje);
  }
}

async function enviarChat(mensaje){
  try{
    const res = await fetch(`${BACKEND_URL}/api/chat`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({mensaje})
    });

    const data = await res.json();
    addMessage(data.respuesta || "Sin respuesta","bot");

  }catch(e){
    addMessage("No se pudo conectar","bot");
  }
}

async function buscarCPK(codigo){
  const cpk = codigo.replace(/\D/g,"");

  try{
    const res = await fetch(`${BACKEND_URL}/api/rastreo/${cpk}`);
    const data = await res.json();

    if(!data.ok){
      addMessage("No se encontró el paquete","bot");
      return;
    }

    addMessage(
      "Estado: " + data.estado +
      "\nFecha: " + (data.fecha || "") +
      "\n" + (data.descripcion || ""),
      "bot"
    );

  }catch(e){
    addMessage("Error al buscar el paquete","bot");
  }
}

input.addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    e.preventDefault();
    procesar();
  }
});
</script>

</body>
</html>
