<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rastreador Chambatina</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#f5f5f5;
      color:#111;
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:20px;
    }
    .hero{
      background:linear-gradient(135deg,#f26b00,#ff9a3d);
      color:#fff;
      padding:24px;
      border-radius:18px;
      margin-bottom:20px;
      box-shadow:0 10px 28px rgba(0,0,0,.12);
    }
    .card{
      background:#fff;
      border-radius:16px;
      padding:20px;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      margin-bottom:20px;
    }
    h1,h2,h3,p{margin-top:0}
    input,textarea,button{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #d7d7d7;
      font-size:16px;
      font-family:inherit;
    }
    textarea{
      min-height:220px;
      resize:vertical;
      font-family:monospace;
    }
    button{
      background:#111;
      color:#fff;
      border:none;
      cursor:pointer;
      font-weight:700;
      margin-top:10px;
    }
    .result{
      margin-top:16px;
      padding:16px;
      border-left:5px solid #f26b00;
      background:#fff7f0;
      border-radius:12px;
      line-height:1.5;
    }
    .error{
      border-left-color:#c62828;
      background:#fff1f1;
    }
    .ok{
      border-left-color:#2e7d32;
      background:#eef8f0;
    }
    .badge{
      display:inline-block;
      padding:7px 12px;
      border-radius:999px;
      background:#ffe4cf;
      color:#a34900;
      font-size:13px;
      font-weight:700;
      margin-bottom:10px;
    }
    .big{
      font-size:30px;
      font-weight:800;
      color:#2e7d32;
      margin-bottom:10px;
    }
    .small{
      color:#666;
      font-size:13px;
      margin-top:10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Rastreador Chambatina</h1>
      <p>Ingrese su número CPK o solo los dígitos. Ejemplo: <b>0259555</b></p>
    </div>

    <div class="card">
      <h2>Buscar paquete</h2>
      <input id="buscar" type="text" placeholder="Ejemplo: 0259555 o CPK-0259555">
      <button onclick="buscarPaquete()">Buscar</button>
      <div id="resultado"></div>
    </div>

    <div class="card">
      <h3>Actualizar base de datos</h3>
      <p class="small">Pega aquí una línea por paquete usando este formato:</p>
      <p class="small"><b>CPK|ESTADO|FECHA|NOMBRE|DESCRIPCION|DIRECCION|TELEFONO</b></p>
      <textarea id="datos"></textarea>
      <button onclick="guardarDatos()">Guardar datos en este navegador</button>
      <div id="info" class="small"></div>
    </div>
  </div>

  <script>
    var DATOS_BASE = `
0259555|EN AGENCIA|2026-03-23|OSMANY CASTELLON RAMIREZ|BICICLETA ELECTRICA|CIENFUEGOS, CIENFUEGOS|53421145
0259532|EN ALMACEN|2026-03-23|MARIA TERESA ROJAS GONZALEZ|MISCELANEA 15|PINAR DEL RIO, PINAR DEL RIO|55916464
0259529|EN AGENCIA|2026-03-23|AMANDA LESVIA DIAZ YERO|PISCINA|HOLGUIN, HOLGUIN|55675812
0237523|ENTREGADO|2026-01-19|FELICIA CARVAJAL MARTIN|BATERIA 48 V 100 AH|PLACETAS, VILLA CLARA|53282278
0257453|EN AGENCIA|2026-03-17|CIRIA UMPIERRE NAPOLES|BATERIA 12 V 100 AH|MINAS, CAMAGUEY|51202638
0243642|PENDIENTE DESAGRUPE|2026-02-03|CARMEN DELIA PEREZ HERNANDEZ|RAC PARA BATERIAS|CIEGO DE AVILA, CIEGO DE AVILA|53646579
`;

    function limpiarCPK(valor){
      return String(valor || "").replace(/\D/g,"");
    }

    function normalizarEstado(estado){
      var e = String(estado || "").toUpperCase().trim();
      if(e.indexOf("ENTREGADO") >= 0) return "ENTREGADO";
      if(e.indexOf("DISTRIB") >= 0) return "DISTRIBUCIÓN";
      if(e.indexOf("DESPACH") >= 0) return "DESPACHO";
      if(e.indexOf("DESAGRUP") >= 0) return "DESAGRUPE";
      if(e.indexOf("CLASIFIC") >= 0) return "CLASIFICADO";
      if(e.indexOf("AGENCIA") >= 0) return "EN AGENCIA";
      if(e.indexOf("ALMACEN") >= 0 || e.indexOf("ALMACÉN") >= 0) return "EN ALMACÉN";
      if(e.indexOf("ARRIBO") >= 0) return "ARRIBO";
      if(e.indexOf("CANAL ROJO") >= 0) return "CANAL ROJO";
      if(e.indexOf("TRANSITO") >= 0 || e.indexOf("TRÁNSITO") >= 0) return "EN TRÁNSITO";
      return e || "EN PROCESO";
    }

    function explicacionEstado(estado){
      switch(estado){
        case "ENTREGADO":
          return "Su paquete ya fue entregado. Gracias por confiar en Chambatina.";
        case "EN AGENCIA":
          return "Su paquete ya se encuentra en agencia y entra en coordinación de entrega local.";
        case "EN ALMACÉN":
          return "Su paquete se encuentra resguardado en almacén, pendiente del siguiente movimiento logístico.";
        case "CLASIFICADO":
          return "Su paquete ya fue clasificado por zona o ruta para continuar avanzando.";
        case "DESAGRUPE":
          return "Su paquete está en proceso de separación del consolidado para seguir su ruta.";
        case "DESPACHO":
          return "Su envío está en fase de despacho y sigue avanzando dentro del proceso logístico.";
        case "DISTRIBUCIÓN":
          return "Su paquete se encuentra en distribución local hacia su zona final.";
        case "ARRIBO":
          return "Su paquete registra arribo a una nueva etapa del proceso.";
        case "CANAL ROJO":
          return "Su envío está bajo revisión adicional. Esto puede extender un poco más el tiempo.";
        case "EN TRÁNSITO":
          return "Su paquete está en tránsito hacia la siguiente etapa logística.";
        default:
          return "Su paquete continúa en proceso logístico.";
      }
    }

    function parsearBase(texto){
      var base = {};
      var lineas = String(texto || "").split(/\r?\n/);

      for(var i=0;i<lineas.length;i++){
        var linea = lineas[i].trim();
        if(!linea) continue;

        var partes = linea.split("|");
        if(partes.length < 2) continue;

        var cpk = limpiarCPK(partes[0]);
        if(!cpk) continue;

        base[cpk] = {
          cpk: cpk,
          estado: normalizarEstado(partes[1] || ""),
          fecha: (partes[2] || "").trim(),
          nombre: (partes[3] || "").trim(),
          descripcion: (partes[4] || "").trim(),
          direccion: (partes[5] || "").trim(),
          telefono: (partes[6] || "").trim()
        };
      }

      return base;
    }

    function obtenerBase(){
      var guardado = localStorage.getItem("chambatina_db_unica");
      if(guardado){
        try{
          return JSON.parse(guardado);
        }catch(e){}
      }
      return parsearBase(DATOS_BASE);
    }

    function guardarDatos(){
      var texto = document.getElementById("datos").value;
      if(!texto.trim()){
        document.getElementById("info").innerHTML = "No has pegado datos.";
        return;
      }

      var base = parsearBase(texto);
      localStorage.setItem("chambatina_db_unica", JSON.stringify(base));
      document.getElementById("info").innerHTML =
        "Registros guardados: " + Object.keys(base).length +
        ". Ejemplos: " + Object.keys(base).slice(0,5).join(", ");
    }

    function buscarPaquete(){
      var codigo = limpiarCPK(document.getElementById("buscar").value);
      var resultado = document.getElementById("resultado");
      var base = obtenerBase();

      if(!codigo){
        resultado.innerHTML = '<div class="result error">Debe escribir un número CPK válido.</div>';
        return;
      }

      if(!base[codigo]){
        resultado.innerHTML = '<div class="result error">No encontramos ese CPK.</div>';
        return;
      }

      var x = base[codigo];

      if(x.estado === "ENTREGADO"){
        resultado.innerHTML =
          '<div class="result ok">' +
          '<div class="big">ENTREGADO</div>' +
          '<div><b>CPK:</b> ' + x.cpk + '</div>' +
          '<div><b>Cliente:</b> ' + (x.nombre || "No disponible") + '</div>' +
          '<div><b>Fecha:</b> ' + (x.fecha || "No disponible") + '</div>' +
          '<div style="margin-top:10px">' + explicacionEstado(x.estado) + '</div>' +
          '</div>';
        return;
      }

      resultado.innerHTML =
        '<div class="result">' +
        '<div class="badge">' + x.estado + '</div>' +
        '<div><b>CPK:</b> ' + x.cpk + '</div>' +
        '<div><b>Cliente:</b> ' + (x.nombre || "No disponible") + '</div>' +
        '<div><b>Descripción:</b> ' + (x.descripcion || "No disponible") + '</div>' +
        '<div><b>Fecha:</b> ' + (x.fecha || "No disponible") + '</div>' +
        '<div><b>Dirección:</b> ' + (x.direccion || "No disponible") + '</div>' +
        '<div><b>Teléfono:</b> ' + (x.telefono || "No disponible") + '</div>' +
        '<div style="margin-top:10px"><b>Explicación:</b> ' + explicacionEstado(x.estado) + '</div>' +
        '</div>';
    }

    window.onload = function(){
      document.getElementById("datos").value = DATOS_BASE.trim();
      var base = obtenerBase();
      document.getElementById("info").innerHTML =
        "Registros listos: " + Object.keys(base).length +
        ". Pruebe con: " + Object.keys(base).slice(0,5).join(", ");
    };

    document.addEventListener("keydown", function(e){
      if(e.key === "Enter" && document.activeElement.id === "buscar"){
        buscarPaquete();
      }
    });
  </script>
</body>
</html>
