<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rastreador Chambatina</title>
</head>
<body>
  <h2>Rastreador Chambatina</h2>
  <input id="cpk" placeholder="Escribe tu CPK">
  <button onclick="buscar()">Buscar</button>
  <p id="respuesta"></p>

  <script>
    async function buscar() {
      const cpk = document.getElementById("cpk").value;

      try {
        const res = await fetch("https://rastreador-tj5b.onrender.com/buscar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cpk })
        });

        const data = await res.json();

        if (data.ok) {
          document.getElementById("respuesta").innerText =
            "CPK: " + data.cpk + "\nEstado: " + data.estado + "\n" + data.explicacion;
        } else {
          document.getElementById("respuesta").innerText = data.mensaje;
        }
      } catch (e) {
        document.getElementById("respuesta").innerText = "Error conectando con el servidor";
      }
    }
  </script>
</body>
</html>
