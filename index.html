<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chambatina</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#111;
      color:#fff;
      margin:0;
      padding:20px;
    }
    .wrap{
      max-width:900px;
      margin:0 auto;
    }
    .card{
      background:#1b1b1b;
      border-radius:16px;
      padding:24px;
      margin-bottom:20px;
      box-shadow:0 8px 25px rgba(0,0,0,.35);
    }
    h1,h2{ color:orange; }
    input, textarea{
      width:100%;
      box-sizing:border-box;
      padding:14px;
      border-radius:10px;
      border:1px solid #444;
      background:#0f0f0f;
      color:#fff;
      margin-top:10px;
      margin-bottom:10px;
      font-size:16px;
    }
    button{
      background:orange;
      color:#111;
      border:none;
      border-radius:10px;
      padding:12px 18px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      margin-right:10px;
    }
    #resultadoRastreo, #resultadoChat{
      margin-top:15px;
      background:#101010;
      border:1px solid #333;
      border-radius:10px;
      padding:15px;
      white-space:pre-line;
      min-height:30px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Rastreador Chambatina</h1>
      <input id="cpk" placeholder="Escribe tu CPK. Ejemplo: 260443" />
      <button onclick="buscarRastreo()">Buscar paquete</button>
      <div id="resultadoRastreo"></div>
    </div>

    <div class="card">
      <h2>Chat Chambatina</h2>
      <textarea id="mensaje" rows="5" placeholder="Pregunta sobre precios, envíos, cajas, equipos o servicios"></textarea>
      <button onclick="preguntarIA()">Preguntar</button>
      <div id="resultadoChat"></div>
    </div>
  </div>

  <script>
    async function buscarRastreo() {
      const cpk = document.getElementById("cpk").value.trim();
      const box = document.getElementById("resultadoRastreo");

      if (!cpk) {
        box.textContent = "Escribe un CPK válido.";
        return;
      }

      box.textContent = "Buscando...";

      try {
        const res = await fetch("/api/rastreo/" + encodeURIComponent(cpk));
        const data = await res.json();

        if (!data.ok) {
          box.textContent = data.mensaje || "No se encontró el paquete.";
          return;
        }

        box.textContent = "Estado: " + data.estado + "\n\n" + data.descripcion;
      } catch (e) {
        console.error(e);
        box.textContent = "No fue posible conectar con el servidor.";
      }
    }

    async function preguntarIA() {
      const mensaje = document.getElementById("mensaje").value.trim();
      const box = document.getElementById("resultadoChat");

      if (!mensaje) {
        box.textContent = "Escribe una pregunta.";
        return;
      }

      box.textContent = "Consultando...";

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ mensaje })
        });

        const data = await res.json();

        if (!data.ok) {
          box.textContent = data.mensaje || "No se pudo obtener respuesta.";
          return;
        }

        box.textContent = data.respuesta;
      } catch (e) {
        console.error(e);
        box.textContent = "No fue posible conectar con el servidor.";
      }
    }
  </script>
</body>
</html>
