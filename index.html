<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambatina</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f5f7;
}

.wrap {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.mode {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.mode button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #eee;
  font-weight: bold;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button.main {
  width: 100%;
  padding: 16px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #d97a2b;
  color: white;
  font-size: 18px;
}

.answer {
  margin-top: 15px;
  padding: 15px;
  background: #eee;
  border-radius: 10px;
  min-height: 80px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- MODOS -->
  <div class="mode">
    <button onclick="setMode('consulta')">Consulta</button>
    <button onclick="setMode('compra')">Compra TikTok</button>
  </div>

  <!-- CONSULTA -->
  <div id="consultaView">
    <div class="card">
      <input id="mensaje" placeholder="CPK, carnet o pregunta">

      <button id="btnEnviar" class="main">Enviar</button>

      <div id="respuesta" class="answer">
        Escriba su número CPK, carnet o su pregunta.
      </div>
    </div>
  </div>

  <!-- COMPRA -->
  <div id="compraView" class="hidden">
    <div class="card">
      <h3>Compra desde TikTok</h3>

      <input id="tiktokUrl" placeholder="Pega el link de TikTok">

      <button class="main" onclick="continuarCompra()">
        Continuar
      </button>
    </div>
  </div>

</div>

<script>
const BACKEND_URL = "https://rastreador-tj5b.onrender.com";

const mensaje = document.getElementById("mensaje");
const respuesta = document.getElementById("respuesta");
const btnEnviar = document.getElementById("btnEnviar");

let procesando = false;

/* ===== MODOS ===== */
function setMode(mode) {
  document.getElementById("consultaView").style.display =
    mode === "consulta" ? "block" : "none";

  document.getElementById("compraView").style.display =
    mode === "compra" ? "block" : "none";
}

/* ===== TIKTOK ===== */
function continuarCompra() {
  const url = document.getElementById("tiktokUrl").value.trim();

  if (!url) {
    alert("Pega un link de TikTok");
    return;
  }

  alert("Link recibido: " + url);
}

/* ===== LÓGICA ===== */
function normalizarNumero(texto) {
  return String(texto || "").replace(/\D/g, "");
}

function ponerRespuesta(texto) {
  respuesta.textContent = texto;
}

async function enviarChat(texto) {
  try {
    const res = await fetch(${BACKEND_URL}/api/chat, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mensaje: texto })
    });

    const data = await res.json();
    ponerRespuesta(data.respuesta || "Sin respuesta");

  } catch {
    ponerRespuesta("Error conectando");
  }
}

async function buscarCPK(cpk) {
  try {
    const res = await fetch(${BACKEND_URL}/api/rastreo/${cpk});
    const data = await res.json();

    ponerRespuesta(data.estado || "No encontrado");

  } catch {
    ponerRespuesta("Error servidor");
  }
}

async function buscarCarnet(carnet) {
  try {
    const res = await fetch(${BACKEND_URL}/api/buscar-carnet?carnet=${carnet});
    const data = await res.json();

    ponerRespuesta(JSON.stringify(data));

  } catch {
    ponerRespuesta("Error servidor");
  }
}

async function procesar() {
  if (procesando) return;

  const texto = mensaje.value.trim();
  if (!texto) return;

  const limpio = normalizarNumero(texto);

  if (limpio.length === 11) {
    await buscarCarnet(limpio);
    return;
  }

  if (limpio.length >= 6 && limpio.length <= 10) {
    await buscarCPK(limpio);
    return;
  }

  await enviarChat(texto);
}

/* EVENTOS */
btnEnviar.addEventListener("click", procesar);

mensaje.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    procesar();
  }
});
</script>

</body>
</html>
