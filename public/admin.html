<!-- Sección de login -->
<div id="loginSection">
  <input type="password" id="tokenInput" placeholder="Token de administrador">
  <button id="loginBtn">Ingresar</button>
</div>

<!-- Dashboard -->
<div id="dashboardSection" style="display:none;">
  <div id="tablaPanel">
    <button id="nuevoBtn">Nuevo pedido</button>
    <button id="refreshBtn">Actualizar</button>
    <button id="logoutBtn">Cerrar sesión</button>
    <table>
      <thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Teléfono</th><th>Producto</th><th>Estado</th></tr></thead>
      <tbody id="pedidosBody"></tbody>
    </table>
  </div>
  <div id="formularioPanel" style="display:none;">
    <input type="text" id="nombre" placeholder="Nombre *">
    <input type="email" id="email" placeholder="Email">
    <input type="tel" id="telefono" placeholder="Teléfono *">
    <input type="text" id="direccion" placeholder="Dirección">
    <input type="text" id="producto" placeholder="Producto *">
    <button id="guardarBtn">Guardar</button>
    <button id="cancelarBtn">Cancelar</button>
  </div>
  <div id="errorMsg"></div>
</div>
